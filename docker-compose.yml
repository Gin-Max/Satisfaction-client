version: '3.8'

services:

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  scraping:
    build: ./scraping
    container_name: scraping
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"

  api:
    build: ./api
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always

volumes:
  es_data:
